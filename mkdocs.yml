site_name: JAX-GalSim
site_description: JAX port of GalSim for GPU-accelerated, differentiable galaxy image simulations
site_url: https://galsim-developers.github.io/JAX-GalSim
repo_url: https://github.com/GalSim-developers/JAX-GalSim
repo_name: GalSim-developers/JAX-GalSim
theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_submodules: true
            show_source: true
            members_order: source
            show_root_heading: true
            show_root_full_path: false
            merge_init_into_class: true
            inherited_members: false
            allow_inspection: true
            force_inspection: true
            filters:
              - "!^_[^_]"
              - "!^__(dict|weakref|doc|firstlineno|module|static_attributes|annotations|dataclass_fields|match_args|file|name|package|cached)__$"

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - rst_in_md
  - pymdownx.superfences

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js


nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Notable Differences: notable-differences.md
  - API Coverage: api-coverage.md
  - API Reference:
      - Profiles:
          - api/profiles/gsobject.md
          - api/profiles/gaussian.md
          - api/profiles/moffat.md
          - api/profiles/spergel.md
          - api/profiles/exponential.md
          - api/profiles/deltafunction.md
          - api/profiles/box.md
      - Composition:
          - api/composition/convolve.md
          - api/composition/sum.md
          - api/composition/transform.md
      - Image: api/image.md
      - Coordinates:
          - api/coordinates/position.md
          - api/coordinates/bounds.md
          - api/coordinates/angle.md
          - api/coordinates/shear.md
          - api/coordinates/celestial.md
      - WCS:
          - api/wcs/wcs.md
          - api/wcs/fitswcs.md
          - api/wcs/fits.md
      - Noise & Random:
          - api/noise/random.md
          - api/noise/noise.md
      - Interpolation:
          - api/interpolation/interpolant.md
          - api/interpolation/interpolatedimage.md
      - Photon Shooting:
          - api/photons/photon_array.md
          - api/photons/sensor.md
      - Configuration:
          - api/config/gsparams.md
          - api/config/errors.md
          - api/config/utilities.md
      - Math:
          - api/math/bessel.md
          - api/math/integ.md
      - Core Internals:
          - api/core/draw.md
          - api/core/interpolate.md
          - api/core/math.md
          - api/core/utils.md
